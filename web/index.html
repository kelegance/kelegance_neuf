<!DOCTYPE html>

<html lang="fr">

<head>

  <!--

    If you are serving your web app in a path other than the root, change the

    href value below to reflect the base path you are serving from.



    The path provided below has to start and end with a slash "/" in order for

    it to work correctly.



    For more details:

    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base



    This is a placeholder for base href that will be replaced by the value of

    the `--base-href` argument provided to `flutter build`.

  -->

  <base href="$FLUTTER_BASE_HREF">



  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <meta name="description" content="Kélégance Prestige — réservation VTC et console chauffeur.">

  <meta name="theme-color" content="#0B1426">



  <!-- PWA / installation écran d'accueil -->

  <meta name="mobile-web-app-capable" content="yes">

  <meta name="application-name" content="Kelegance">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="apple-mobile-web-app-title" content="Kelegance">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">



  <!-- Favicon -->

  <link rel="icon" type="image/png" href="favicon.png"/>



  <title>Kélégance Prestige</title>

  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JavaScript API — requis pour google_maps_flutter sur le Web -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCM_g7NBu0L8WZDi8SuJTyt2wiilbCvfmI"></script>

  <!-- Cache hors-ligne : flutter_service_worker.js injecté au build (scripts/inject-pwa-cache.mjs). -->

  <style>

    html, body {

      margin: 0;

      height: 100%;

      background: #0B1426;

    }

    flutter-view,
    flt-glass-pane,
    flt-scene-host,
    flt-semantics-host {
      background-color: #0B1426 !important;
    }

    #kelegance-loader {

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      height: 100%;

      background: #0B1426;

      color: #D4AF37;

      font-family: 'Segoe UI', sans-serif;

      letter-spacing: 0.12em;

      font-size: 12px;

    }

    #kelegance-loader .spinner {

      width: 36px;

      height: 36px;

      border: 2px solid rgba(212, 175, 55, 0.25);

      border-top-color: #D4AF37;

      border-radius: 50%;

      animation: kelegance-spin 0.8s linear infinite;

      margin-bottom: 16px;

    }

    @keyframes kelegance-spin {

      to { transform: rotate(360deg); }

    }

  </style>

</head>

<body>

  <div id="kelegance-loader">

    <div class="spinner"></div>

    <div>KELEGANCE</div>

  </div>

  <!--

    You can customize the "flutter_bootstrap.js" script.

    This is useful to provide a custom configuration to the Flutter loader

    or to give the user feedback during the initialization process.



    For more details:

    * https://docs.flutter.dev/platform-integration/web/initialization

  -->

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('kelegance-loader');
      if (loader) loader.remove();
    });
  </script>
</body>

</html>
