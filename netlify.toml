# Kelegance — déploiement Flutter Web sur Netlify

[[plugins]]
  package = "netlify-plugin-flutter"

  [plugins.inputs]
    channel = "stable"

[build]
  command = "bash scripts/netlify-build.sh"
  publish = "build/web"

[build.environment]
  NODE_VERSION = "22"
  # Évite l’échec npm si NODE_OPTIONS est défini dans l’UI Netlify avec des flags non autorisés.
  NODE_OPTIONS = ""
  # Chemin du SDK Flutter (mis en cache entre les builds Netlify).
  FLUTTER_ROOT = "/opt/buildhome/flutter"

[[redirects]]
  from = "/doc/*"
  to = "/doc/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
