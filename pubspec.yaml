name: kelegance_neuf
description: "Projet Kélégance - VTC"
publish_to: 'none'

version: 1.1.1+17

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.5.3
  http: ^1.1.0
  location: ^8.0.1
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  firebase_messaging: ^16.0.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3
  system_alert_window:
    path: packages/system_alert_window
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  wakelock_plus: ^1.6.1
  geolocator: ^14.0.2
  audioplayers: ^6.7.1
  qr_flutter: ^4.1.0
  share_plus: ^13.1.0
  package_info_plus: ^10.1.0
  path_provider: ^2.1.5
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/kelegance_logo.png
  adaptive_icon_background: "#0B1426"
  adaptive_icon_foreground: assets/images/kelegance_logo.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/kelegance_logo.png
    background_color: "#0B1426"
    theme_color: "#0B1426"

flutter_native_splash:
  color: "#0D0D0D"
  image: assets/images/kelegance_logo.png
  android_12:
    color: "#0D0D0D"
    image: assets/images/kelegance_logo.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/course_instantanee.mp3
    - assets/sounds/alerte_notification.mp3